spring.application.name=TransitOps

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/transitops?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT (placeholder — Person 1 owns auth)
jwt.secret=transitops-hackathon-secret-key-placeholder-2024
jwt.expiration=86400000
