# =============================================
# TransitOps — Application Configuration
# =============================================

server.port=8080

# ---- MySQL Datasource ----
spring.datasource.url=jdbc:mysql://localhost:3306/transitops?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=TransitOpsHackathonSuperSecretKeyThatIsAtLeast256BitsLong2024!
jwt.expiration=86400000

# ---- CORS (handled in SecurityConfig, but documented here) ----
# Frontend dev server: http://localhost:5173
