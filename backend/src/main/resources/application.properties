# =============================================
# TransitOps — Application Configuration
# =============================================

server.port=8080
spring.main.allow-bean-definition-overriding=true

# ---- PostgreSQL Datasource ----
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1234

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
jwt.secret=TransitOpsHackathonSuperSecretKeyThatIsAtLeast256BitsLong2024!
jwt.expiration=86400000
app.jwt.secret=TransitOpsHackathonSuperSecretKeyThatIsAtLeast256BitsLong2024!
app.jwt.expiration-ms=86400000

# ---- CORS (handled in SecurityConfig, but documented here) ----
# Frontend dev server: http://localhost:5173
