spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:transitopsdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
